<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="mainBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#130a2a"/>
    </linearGradient>
    <linearGradient id="neonBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="cardShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="40%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="steamG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#2a475e"/>
    </linearGradient>
    <linearGradient id="googleG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01875f"/>
      <stop offset="100%" style="stop-color:#34a853"/>
    </linearGradient>
    <linearGradient id="amazonG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#131921"/>
      <stop offset="100%" style="stop-color:#232f3e"/>
    </linearGradient>
    <linearGradient id="psnG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00439c"/>
      <stop offset="100%" style="stop-color:#0070cc"/>
    </linearGradient>
    <linearGradient id="xboxG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#52b043"/>
    </linearGradient>
    <linearGradient id="netflixG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#e50914"/>
    </linearGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="800" height="300" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#mainBg2)"/>

  <!-- Animated grid lines -->
  <pattern id="grid2" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#4f46e5" stroke-width="0.4" opacity="0.12"/>
  </pattern>
  <rect width="800" height="300" fill="url(#grid2)"/>

  <!-- Glowing orbs background -->
  <circle cx="650" cy="80" r="160" fill="#7c3aed" opacity="0.08"/>
  <circle cx="150" cy="220" r="130" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="400" cy="150" r="200" fill="#ec4899" opacity="0.04"/>

  <!-- Scanline accent -->
  <rect x="0" y="0" width="800" height="1" fill="url(#neonBorder)" opacity="0.7"/>
  <rect x="0" y="299" width="800" height="1" fill="url(#neonBorder)" opacity="0.7"/>

  <!-- STEAM card — left cluster -->
  <g filter="url(#cardShadow)" transform="rotate(-10, 95, 130)">
    <rect x="25" y="90" width="140" height="85" rx="12" fill="url(#steamG)"/>
    <rect x="25" y="90" width="140" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="25" y="90" width="140" height="4" rx="2" fill="#66c0f4" opacity="0.6"/>
    <text x="95" y="140" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="15" font-weight="900" fill="#66c0f4">STEAM</text>
    <text x="95" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#c7d5e0" opacity="0.8">WALLET</text>
    <text x="95" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4f7da1" opacity="0.9">GIFT CARD</text>
  </g>

  <!-- Google Play card -->
  <g filter="url(#cardShadow)" transform="rotate(7, 220, 110)">
    <rect x="150" y="65" width="140" height="85" rx="12" fill="url(#googleG)"/>
    <rect x="150" y="65" width="140" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="150" y="65" width="140" height="4" rx="2" fill="#4ade80" opacity="0.6"/>
    <text x="220" y="115" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="11" font-weight="900" fill="#ffffff">Google Play</text>
    <text x="220" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.85">GIFT CARD</text>
  </g>

  <!-- Amazon card — lower left -->
  <g filter="url(#cardShadow)" transform="rotate(12, 115, 218)">
    <rect x="45" y="178" width="140" height="85" rx="12" fill="url(#amazonG)"/>
    <rect x="45" y="178" width="140" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="45" y="178" width="140" height="4" rx="2" fill="#ff9900" opacity="0.7"/>
    <text x="115" y="228" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="15" font-weight="900" fill="#ff9900">amazon</text>
    <text x="115" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.75">GIFT CARD</text>
  </g>

  <!-- PSN card — right cluster -->
  <g filter="url(#cardShadow)" transform="rotate(-7, 640, 105)">
    <rect x="565" y="65" width="150" height="85" rx="12" fill="url(#psnG)"/>
    <rect x="565" y="65" width="150" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="565" y="65" width="150" height="4" rx="2" fill="#00aaff" opacity="0.7"/>
    <text x="640" y="115" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="13" font-weight="900" fill="#ffffff">PlayStation</text>
    <text x="640" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#cce4ff" opacity="0.85">STORE</text>
  </g>

  <!-- Xbox card -->
  <g filter="url(#cardShadow)" transform="rotate(9, 710, 200)">
    <rect x="635" y="162" width="150" height="85" rx="12" fill="url(#xboxG)"/>
    <rect x="635" y="162" width="150" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="635" y="162" width="150" height="4" rx="2" fill="#52b043" opacity="0.7"/>
    <text x="710" y="212" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="15" font-weight="900" fill="#ffffff">XBOX</text>
    <text x="710" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#c0e8a8" opacity="0.85">GIFT CARD</text>
  </g>

  <!-- Netflix card — lower right -->
  <g filter="url(#cardShadow)" transform="rotate(-6, 620, 222)">
    <rect x="548" y="182" width="145" height="85" rx="12" fill="url(#netflixG)"/>
    <rect x="548" y="182" width="145" height="85" rx="12" fill="url(#cardShine)"/>
    <rect x="548" y="182" width="145" height="4" rx="2" fill="#e50914" opacity="0.7"/>
    <text x="620" y="232" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="15" font-weight="900" fill="#ffffff">NETFLIX</text>
    <text x="620" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ffbbbb" opacity="0.85">GIFT CARD</text>
  </g>

  <!-- Central glow circle -->
  <circle cx="400" cy="145" r="75" fill="#4f46e5" opacity="0.07"/>
  <circle cx="400" cy="145" r="55" fill="#7c3aed" opacity="0.05"/>

  <!-- Gift box icon — center -->
  <g transform="translate(367, 105)" filter="url(#neonGlow)">
    <rect x="0" y="18" width="66" height="52" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
    <rect x="-5" y="10" width="76" height="16" rx="5" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
    <rect x="30" y="10" width="6" height="60" fill="#a855f7" opacity="0.8"/>
    <rect x="0" y="10" width="66" height="4" rx="2" fill="#c084fc" opacity="0.5"/>
    <path d="M30 10 Q15 -8 5 -3 Q10 12 30 10 Z" fill="#ec4899" opacity="0.9"/>
    <path d="M36 10 Q51 -8 61 -3 Q56 12 36 10 Z" fill="#ec4899" opacity="0.9"/>
    <circle cx="10" cy="45" r="4" fill="#a855f7" opacity="0.4"/>
    <circle cx="56" cy="55" r="3" fill="#7c3aed" opacity="0.4"/>
  </g>

  <!-- Main Title -->
  <text x="400" y="185" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="url(#titleGrad2)" filter="url(#glow2)">🎁 Gift Cards</text>

  <!-- Subtitle platforms -->
  <text x="400" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">Steam  •  Google Play  •  Amazon  •  PSN  •  Xbox  •  Netflix</text>

  <!-- Bottom tagline -->
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#818cf8" opacity="0.85" letter-spacing="2">⚡ INSTANT DIGITAL DELIVERY — ALL CARDS</text>

  <!-- Corner decorations -->
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="22" opacity="0.25">💳</text>
  <text x="738" y="35" font-family="Arial, sans-serif" font-size="22" opacity="0.25">🎁</text>
  <text x="30" y="285" font-family="Arial, sans-serif" font-size="22" opacity="0.25">🎮</text>
  <text x="735" y="285" font-family="Arial, sans-serif" font-size="22" opacity="0.25">⭐</text>
</svg>
