<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#2a475e"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#1db954"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003087"/>
      <stop offset="100%" style="stop-color:#0070cc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="240" fill="none" stroke="#ffffff" stroke-width="0"/>
  <!-- Decorative cards in background -->
  <g transform="rotate(-15, 200, 120)">
    <rect x="60" y="50" width="110" height="70" rx="8" fill="url(#card1)" opacity="0.9"/>
    <text x="115" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#66c0f4">STEAM</text>
  </g>
  <g transform="rotate(8, 200, 120)">
    <rect x="220" y="70" width="110" height="70" rx="8" fill="url(#card2)" opacity="0.9"/>
    <text x="275" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff">XBOX</text>
  </g>
  <g transform="rotate(-5, 200, 120)">
    <rect x="145" y="110" width="110" height="70" rx="8" fill="url(#card3)" opacity="0.85"/>
    <text x="200" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PlayStation</text>
  </g>
  <!-- Main text -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#ffffff">🎁 كروت الهدايا</text>
  <text x="200" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ffffff" opacity="0.85">Gift Cards</text>
</svg>
