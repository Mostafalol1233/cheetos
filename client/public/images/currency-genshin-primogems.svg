<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A9E0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmerPrimo" x1="0%" y1="0%" x2="70%" y2="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <filter id="glowPurple">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polygon points="100,10 130,50 170,60 140,95 150,140 100,120 50,140 60,95 30,60 70,50" fill="url(#primoGrad)" filter="url(#glowPurple)" stroke="#3B0A8A" stroke-width="2"/>
  <polygon points="100,10 130,50 100,70 70,50" fill="url(#shimmerPrimo)" opacity="0.9"/>
  <circle cx="100" cy="100" r="22" fill="#E9D5FF" opacity="0.5"/>
  <text x="100" y="107" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#3B0A8A">★</text>
  <text x="100" y="170" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0.9" letter-spacing="0.5">PRIMOGEM</text>
</svg>
