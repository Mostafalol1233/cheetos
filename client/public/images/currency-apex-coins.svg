<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC7700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4890A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6600" flood-opacity="0.5"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="88" fill="url(#coinGrad)" filter="url(#shadow)" stroke="#AA5500" stroke-width="3"/>
  <circle cx="100" cy="100" r="75" fill="url(#innerGrad)" stroke="#CC8800" stroke-width="2"/>
  <text x="100" y="78" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#7A3300">A</text>
  <text x="100" y="120" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#7A3300" letter-spacing="2">APEX</text>
  <text x="100" y="140" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="700" fill="#7A3300" letter-spacing="1">COINS</text>
  <path d="M 30 100 Q 100 55 170 100" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.3"/>
</svg>
