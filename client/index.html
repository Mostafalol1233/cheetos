  <style>
    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: radial-gradient(circle at top, #1b2a4a 0%, #0a1224 45%, #05070f 100%);
      color: #f8fafc;
      font-family: 'Poppins', system-ui, sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .app-loader--hide {
      opacity: 0;
      visibility: hidden;
    }

    .app-loader__logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 40px rgba(13, 148, 136, 0.35);
    }

    .app-loader__logo img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .app-loader__orbit {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .app-loader__orbit span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #22d3ee, #a855f7);
      transform-origin: -50px -50px;
      animation: orbit 1.6s linear infinite;
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.6);
    }

    .app-loader__orbit span:nth-child(2) {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #facc15, #f97316);
      animation-duration: 2.2s;
      transform-origin: -60px -60px;
    }

    .app-loader__orbit span:nth-child(3) {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      animation-duration: 2.8s;
      transform-origin: -40px -40px;
    }

    .app-loader__text {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(248, 250, 252, 0.75);
    }

    @keyframes orbit {
      from {
        transform: rotate(0deg) translate(50px) rotate(0deg);
      }

      to {
        transform: rotate(360deg) translate(50px) rotate(-360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-loader__orbit span {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <div id="app-loader" class="app-loader" role="status" aria-live="polite">
    <div class="app-loader__logo">
      <img src="/logo.png" alt="Diaa Eldeen logo" />
    </div>
    <div class="app-loader__orbit" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="app-loader__text">Loading the store</div>
  </div>
